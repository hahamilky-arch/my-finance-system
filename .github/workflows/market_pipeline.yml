name: Market Data Pipeline

on:
  schedule:
    # 한국 시간 기준 17:00 (UTC 08:00) -> KR 시장 분석
    - cron: '0 8 * * *'
    # 한국 시간 기준 08:00 (UTC 23:00) -> US 시장 분석
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      market:
        description: 'Target Market (KR or US)'
        required: true
        default: 'KR'
      target_date:
        description: 'Specific date to re-run (YYYY-MM-DD, optional)'
        required: false

jobs:
  sync-and-analyze:
    runs-on: ubuntu-latest
    concurrency:
      group: market-pipeline-${{ github.event.inputs.market || 'schedule' }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with: 
          python-version: '3.9'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: pip install yfinance supabase pandas python-dotenv scipy
      
      - name: Execute Pipeline
        run: |
          # 1. 기본 파이썬 실행 명령어 설정
          CMD="python run_pipeline.py"
          
          # 2. 시장 결정
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            MARKET="${{ github.event.inputs.market }}"
          elif [ "${{ github.event.schedule }}" == "0 8 * * *" ]; then
            MARKET="KR"
          else
            MARKET="US"
          fi
          CMD="$CMD --market $MARKET"
          
          # 3. 날짜 인자 추가 (입력값이 있을 때만 추가)
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            CMD="$CMD --target_date ${{ github.event.inputs.target_date }}"
          fi
          
          # 4. 명령어 실행
          echo "Executing: $CMD"
          $CMD
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
