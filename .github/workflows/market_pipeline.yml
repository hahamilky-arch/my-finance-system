name: Market Data Pipeline

on:
  schedule:
    # 한국 시간 기준 17:00 (UTC 08:00) -> KR 시장 분석
    - cron: '0 8 * * *'
    # 한국 시간 기준 08:00 (UTC 23:00) -> US 시장 분석
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      market:
        description: 'Target Market (KR or US)'
        required: true
        default: 'KR'
      target_date:
        description: 'Specific date to re-run (YYYY-MM-DD, optional)'
        required: false

jobs:
  sync-and-analyze:
    runs-on: ubuntu-latest
    concurrency:
      group: market-pipeline-${{ github.event.inputs.market || 'schedule' }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with: 
          python-version: '3.9'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: pip install yfinance supabase pandas python-dotenv scipy
      
      - name: Execute Pipeline
        run: |
          # 1. 시장 결정 (스케줄 자동 실행 vs 수동 실행)
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            MARKET="${{ github.event.inputs.market }}"
            DATE_ARG="--target_date ${{ github.event.inputs.target_date }}"
          else
            # 스케줄 실행 시 (0 8 * * * 은 KR, 나머지는 US)
            if [ "${{ github.event.schedule }}" == "0 8 * * *" ]; then
              MARKET="KR"
            else
              MARKET="US"
            fi
            DATE_ARG=""
          fi
          
          # 2. 파이프라인 실행
          python run_pipeline.py --market $MARKET $DATE_ARG
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
