name: Daily Stock Fetch
on:
  schedule:
      - cron: '15 9 * * *'  # 매일 오후 7시(UTC 기준 07시)에 실행
  workflow_dispatch:      # 수동으로도 실행 가능하게 설정

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    concurrency: # 이 부분 추가
      group: daily-stock-pipeline
      cancel-in-progress: true # 새 작업이 들어오면 이전 작업은 중단

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with: 
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance supabase pandas python-dotenv
      
      - name: Run Data Collection
        run: python main_v2.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Run Analysis
        run: python update_momentum_kr.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Run Analysis Rank
        run: python update_rank_kr.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Run Cleanup
        run: python cleanup.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
